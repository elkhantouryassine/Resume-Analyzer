<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Architeo Recruit - Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="/assets/tab-logo.jpeg" type="image/jpeg">
  <link rel="stylesheet" href="styles.css?v=dark-rag-1">
  <script src="rag-widget.js?v=dark-rag-1" defer></script>
</head>
<body class="home-body">
  <main class="welcome-screen welcome-page" aria-label="Page d'accueil">
    <div class="welcome-topline">
      
      <a class="welcome-history-link" href="/history">Historique</a>
    </div>

    <div class="welcome-visual" aria-hidden="true">
      <div class="welcome-panel panel-a"></div>
      <div class="welcome-panel panel-b"></div>
      <div class="welcome-panel panel-c"></div>
    </div>

    <section class="welcome-layout">
      <div class="welcome-content">
        <p class="welcome-kicker">Architeo</p>
        <img class="welcome-brand-art" src="/assets/architeo-recruite-logo.png" alt="Logo Architeo Recruit">
        <h1>Architeo <span class="welcome-title-accent">Recruit</span></h1>
        <p class="welcome-copy">Analysez un CV, mesurez son alignement avec une offre et obtenez une synthèse claire pour la décision RH.</p>
        <div class="welcome-actions">
          <a class="welcome-start" href="/app?start=1">Cliquez pour commencer</a>
          <a class="welcome-secondary" href="/history">Voir les analyses</a>
        </div>
        <div class="welcome-proof" aria-label="Modules disponibles">
          <span>ATS</span>
          <span>RAG</span>
          <span>Rapport</span>
          <span>Profil</span>
        </div>
      </div>

      <aside class="welcome-dashboard" aria-label="Aperçu du tableau de bord">
        <div class="dashboard-head">
          <span>Score global</span>
          <strong>86%</strong>
        </div>
        <div class="dashboard-bars">
          <span style="--bar: 92%"></span>
          <span style="--bar: 78%"></span>
          <span style="--bar: 64%"></span>
        </div>
        <div class="dashboard-card-row">
          <div>
            <span>Type profil</span>
            <strong>Data Analyst</strong>
          </div>
          <div>
            <span>ATS</span>
            <strong>80%</strong>
          </div>
        </div>
        <div class="dashboard-tags">
          <span>Python</span>
          <span>SQL</span>
          <span>Power BI</span>
          <span>Reporting</span>
        </div>
      </aside>
    </section>
  </main>
</body>
</html>
